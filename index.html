<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>แบบจำลองฟิสิกส์: คนยืนแกว่งวัตถุ & เชือกขาด</title>
    <style>
        body { 
            margin: 0; 
            background-color: #f0f4f8; 
            font-family: 'Segoe UI', Tahoma, sans-serif; 
            color: #333;
            overflow: hidden;
        }
        
        #physics-panel { 
            position: absolute; 
            top: 20px; 
            left: 20px; 
            background: white; 
            padding: 20px; 
            border-radius: 8px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            width: 320px;
            z-index: 10;
        }

        h2 { margin-top: 0; font-size: 1.1rem; color: #2c3e50; border-bottom: 2px solid #3498db; padding-bottom: 5px; }
        
        .control-group { margin-bottom: 12px; }
        label { display: flex; justify-content: space-between; font-weight: bold; font-size: 0.9rem; margin-bottom: 5px; }
        input[type=range] { width: 100%; cursor: pointer; }
        
        .limit-group { background: #ffeaa7; padding: 10px; border-radius: 6px; margin-bottom: 15px; border: 1px solid #fdcb6e; }

        .dashboard {
            background: #e8f4fd;
            padding: 15px;
            border-radius: 6px;
            margin-top: 15px;
            border: 1px solid #bce0fd;
        }

        .data-row { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 0.95rem; }
        .data-val { font-family: monospace; font-size: 1.1rem; font-weight: bold; color: #d35400; }
        
        .status-box {
            text-align: center; margin-top: 15px; padding: 10px; border-radius: 6px; font-weight: bold;
            background: #2ecc71; color: white; transition: 0.3s;
        }

        button {
            width: 100%; padding: 10px; margin-top: 10px;
            background: #3498db; color: white; border: none; border-radius: 6px;
            font-weight: bold; cursor: pointer; font-size: 1rem;
        }
        button:hover { background: #2980b9; }

        canvas { display: block; }
    </style>
</head>
<body>

    <div id="physics-panel">
        <h2>🎛️ ควบคุมตัวแปร (Input)</h2>
        
        <div class="control-group">
            <label><span>มวลวัตถุ (m):</span> <span id="mVal">1.0 kg</span></label>
            <input type="range" id="mass" min="0.1" max="5.0" step="0.1" value="1.0">
        </div>
        
        <div class="control-group">
            <label><span>ความเร็วหมุน (v):</span> <span id="vVal">5.0 m/s</span></label>
            <input type="range" id="velocity" min="1.0" max="15.0" step="0.5" value="5.0">
        </div>

        <div class="control-group">
            <label><span>ความยาวเชือก (r):</span> <span id="rVal">2.0 m</span></label>
            <input type="range" id="radius" min="1.0" max="5.0" step="0.1" value="2.0">
        </div>

        <div class="limit-group">
            <label><span>⚠️ แรงตึงเชือกสูงสุด (T_max):</span> <span id="tmaxVal" style="color:#d35400;">50 N</span></label>
            <input type="range" id="maxTension" min="10" max="150" step="5" value="50">
        </div>

        <div class="dashboard">
            <h2>📊 ผลการคำนวณ (Output)</h2>
            <div class="data-row">
                <span>แรงดึงเชือกขณะนี้ (Fc):</span>
                <span class="data-val" id="fcVal">12.50 N</span>
            </div>
        </div>

        <div id="statusBox" class="status-box">🟢 สถานะ: เชือกปกติ</div>
        <button id="resetBtn">🔄 เริ่มการทดลองใหม่</button>
    </div>

    <canvas id="simCanvas"></canvas>

    <script>
        const canvas = document.getElementById('simCanvas');
        const ctx = canvas.getContext('2d');
        
        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        // ดึง UI Elements
        const massInput = document.getElementById('mass');
        const velocityInput = document.getElementById('velocity');
        const radiusInput = document.getElementById('radius');
        const maxTensionInput = document.getElementById('maxTension');
        const resetBtn = document.getElementById('resetBtn');
        
        const mVal = document.getElementById('mVal');
        const vVal = document.getElementById('vVal');
        const rVal = document.getElementById('rVal');
        const tmaxVal = document.getElementById('tmaxVal');
        const fcVal = document.getElementById('fcVal');
        const statusBox = document.getElementById('statusBox');

        // ตัวแปรจำลอง
        const scale = 60; // 1 เมตร = 60 pixels
        let angle = 0;
        let isSnapped = false;
        let snapAngle = 0; // เก็บมุมตอนที่เชือกขาด
        
        // พิกัดวัตถุ
        let objX = 0, objY = 0;
        let snapVx = 0, snapVy = 0;

        resetBtn.addEventListener('click', () => {
            isSnapped = false;
            angle = 0;
            statusBox.style.background = "#2ecc71";
            statusBox.innerText = "🟢 สถานะ: เชือกปกติ";
        });

        function drawArrow(fromX, fromY, toX, toY, color) {
            const headlen = 12;
            const dx = toX - fromX;
            const dy = toY - fromY;
            const ang = Math.atan2(dy, dx);
            
            ctx.beginPath();
            ctx.moveTo(fromX, fromY);
            ctx.lineTo(toX, toY);
            ctx.lineTo(toX - headlen * Math.cos(ang - Math.PI / 6), toY - headlen * Math.sin(ang - Math.PI / 6));
            ctx.moveTo(toX, toY);
            ctx.lineTo(toX - headlen * Math.cos(ang + Math.PI / 6), toY - headlen * Math.sin(ang + Math.PI / 6));
            ctx.strokeStyle = color;
            ctx.lineWidth = 3;
            ctx.stroke();
            ctx.lineWidth = 1;
        }

        // ฟังก์ชันวาดตัวคนแบบ Top-down
        function drawPerson(cx, cy, currentAngle) {
            ctx.save();
            ctx.translate(cx, cy);
            ctx.rotate(currentAngle); // หมุนตัวคนให้หันไปทางวัตถุเสมอ

            // วาดไหล่ (ลำตัว)
            ctx.beginPath();
            ctx.moveTo(0, -16);
            ctx.lineTo(0, 16);
            ctx.lineWidth = 14;
            ctx.lineCap = 'round';
            ctx.strokeStyle = '#2980b9'; // สีเสื้อคลุม
            ctx.stroke();

            // วาดแขนยื่นไปจับเชือก
            ctx.beginPath();
            ctx.moveTo(0, -14); // จากไหล่ซ้าย
            ctx.lineTo(25, -4); // ยื่นไปรวมตรงกลาง
            ctx.moveTo(0, 14);  // จากไหล่ขวา
            ctx.lineTo(25, 4);  // ยื่นไปรวมตรงกลาง
            ctx.lineWidth = 7;
            ctx.strokeStyle = '#f1c40f'; // สีแขนเสื้อ
            ctx.stroke();

            // วาดมือ
            ctx.beginPath();
            ctx.arc(28, -3, 4, 0, Math.PI * 2);
            ctx.arc(28, 3, 4, 0, Math.PI * 2);
            ctx.fillStyle = '#ffcc99'; // สีผิว
            ctx.fill();

            // วาดหัว (อยู่ตรงกลางจุดหมุน)
            ctx.beginPath();
            ctx.arc(0, 0, 11, 0, Math.PI * 2);
            ctx.fillStyle = '#ffcc99';
            ctx.fill();
            
            // วาดทรงผม
            ctx.beginPath();
            ctx.arc(0, 0, 12, Math.PI / 2, Math.PI * 1.5);
            ctx.fillStyle = '#3e2723'; // สีผม
            ctx.fill();

            ctx.restore();
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            const m = parseFloat(massInput.value);
            const v = parseFloat(velocityInput.value);
            const r = parseFloat(radiusInput.value);
            const T_max = parseFloat(maxTensionInput.value);

            mVal.innerText = m.toFixed(1) + " kg";
            vVal.innerText = v.toFixed(1) + " m/s";
            rVal.innerText = r.toFixed(1) + " m";
            tmaxVal.innerText = T_max + " N";

            const Fc = (m * v * v) / r;
            fcVal.innerText = Fc.toFixed(2) + " N";

            if (Fc > T_max * 0.8 && !isSnapped) {
                fcVal.style.color = "red";
            } else {
                fcVal.style.color = "#d35400";
            }

            const cx = canvas.width / 2 + 100;
            const cy = canvas.height / 2;
            const pxRadius = r * scale;

            // เช็คเชือกขาด
            if (!isSnapped && Fc > T_max) {
                isSnapped = true;
                snapAngle = angle; // จำมุมตอนที่เชือกขาดไว้
                statusBox.style.background = "#e74c3c";
                statusBox.innerText = "💥 เชือกขาด! (แรงเกินจำกัด)";
                
                const dt = 0.016; 
                snapVx = -Math.sin(angle) * (v * scale * dt);
                snapVy = Math.cos(angle) * (v * scale * dt);
            }

            // วาดวงโคจรเส้นประ (Guideline)
            ctx.beginPath();
            ctx.arc(cx, cy, pxRadius, 0, Math.PI * 2);
            ctx.strokeStyle = '#bdc3c7';
            ctx.setLineDash([5, 5]);
            ctx.stroke();
            ctx.setLineDash([]);

            // หามุมที่คนต้องหันไป (ถ้าเชือกขาดแล้วคนจะหยุดหมุน)
            const personAngle = isSnapped ? snapAngle : angle;
            
            // วาดคนหมุน (ส่งค่ามุมไปด้วย)
            drawPerson(cx, cy, personAngle);

            // คำนวณตำแหน่งมือคน (เพื่อลากเชือกจากมือ)
            const handX = cx + Math.cos(personAngle) * 28;
            const handY = cy + Math.sin(personAngle) * 28;

            if (!isSnapped) {
                const omega = v / r; 
                angle += omega * 0.016; 
                
                objX = cx + Math.cos(angle) * pxRadius;
                objY = cy + Math.sin(angle) * pxRadius;

                // วาดเชือก (จากมือไปหาวัตถุ)
                ctx.beginPath();
                ctx.moveTo(handX, handY);
                ctx.lineTo(objX, objY);
                ctx.strokeStyle = '#7f8c8d';
                ctx.lineWidth = 2;
                ctx.stroke();

                // ลูกศรแรงดึงชี้เข้าหาคน
                const fcLen = Fc * 1.5;
                const fcTargetX = objX - Math.cos(angle) * fcLen;
                const fcTargetY = objY - Math.sin(angle) * fcLen;
                drawArrow(objX, objY, fcTargetX, fcTargetY, '#e74c3c');
            } else {
                // วัตถุลอยไปตามแนวเส้นสัมผัส
                objX += snapVx;
                objY += snapVy;
                
                // วาดเศษเชือกขาดที่ติดมือคน
                ctx.beginPath();
                ctx.moveTo(handX, handY);
                ctx.lineTo(handX + Math.cos(snapAngle) * 20, handY + Math.sin(snapAngle) * 20);
                ctx.strokeStyle = '#7f8c8d';
                ctx.lineWidth = 2;
                ctx.stroke();
            }

            // วาดวัตถุ
            const objVisualSize = 10 + (m * 3);
            ctx.beginPath();
            ctx.arc(objX, objY, objVisualSize, 0, Math.PI * 2);
            ctx.fillStyle = isSnapped ? '#e74c3c' : '#f39c12';
            ctx.fill();
            ctx.strokeStyle = '#d35400';
            ctx.lineWidth = 2;
            ctx.stroke();

            // ลูกศรความเร็ว
            const vVisualLen = v * 10;
            const currentObjAngle = isSnapped ? snapAngle : angle;
            const vTargetX = objX + (isSnapped ? snapVx * 20 : -Math.sin(currentObjAngle) * vVisualLen);
            const vTargetY = objY + (isSnapped ? snapVy * 20 : Math.cos(currentObjAngle) * vVisualLen);
            drawArrow(objX, objY, vTargetX, vTargetY, '#2ecc71');

            requestAnimationFrame(draw);
        }

        draw();
    </script>
</body>
</html>
